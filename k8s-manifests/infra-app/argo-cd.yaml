---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-cd
  namespace: argo-cd
spec:
  destination:
    namespace: argo-cd
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: argo-cd
    helm:
      parameters:
        - name: server.ingress.enabled
          value: "true"
        - name: server.ingress.host
          value: argocd
        - name: server.ingress.tls
          value: "true"
        - name: server.ingress.ingressClassName
          value: tailscale
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 9.4.17
  syncPolicy:
    automated:
      enabled: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

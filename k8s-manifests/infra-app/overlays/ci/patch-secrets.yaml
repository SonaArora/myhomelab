---
# In CI the SealedSecret is encrypted with the production cluster key and
# cannot be decrypted by the ephemeral CI cluster. Disable auto-sync so
# ArgoCD does not attempt to apply it and fail.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argo-cd
spec:
  syncPolicy:
    automated:
      enabled: false

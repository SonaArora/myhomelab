---
# Grafana alerting provisioning files mounted directly into Grafana pod.
# chatid is quoted here to prevent YAML integer parsing after env var substitution.
# Actual values come from grafana-telegram-secret at runtime — nothing sensitive here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-provisioning
  namespace: monitoring
data:
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: Telegram
        receivers:
          - uid: telegram-uid
            type: telegram
            settings:
              bottoken: $TELEGRAM_BOT_TOKEN
              chatid: "$TELEGRAM_CHAT_ID"
            disableResolveMessage: false
  notification_policy.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: Telegram
        group_by: ["grafana_folder", "alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

# clone git repo for kubespray
- name: Prepare and run Kubespray
  hosts: localhost
  vars_files:
  - vars/tailscale-secrets.yaml
  - vars/cluster.yaml
  

  tasks:

  - name: Install collections from requirements file
    community.general.ansible_galaxy_install:
      type: collection
      requirements_file: "{{ playbook_dir }}"/requirements.yml

  - name: Check vm status
    become: true
    ansible.builtin.command:
      cmd: "virsh domstate {{ item.name }}"
    loop: "{{ kubespray_nodes }}"
    register: vm_status
    failed_when: "'running' not in vm_status.stdout"

  
  # - name: Fail if any VM exists
  #   ansible.builtin.fail:
  #     msg: "One or more VMs already exist. Please delete them before running this playbook."
  #   when: existing_vms.results | selectattr('rc', 'eq', 0) | list | length > 0

  - name: Add runtime inventory for Kubespray
    ansible.builtin.add_host:
      name: "{{ item.name }}"
      groups:
        - kube_control_plane
        - etcd
        - kube_node
        - k8s_cluster
      ansible_host: "{{ item.ansible_host }}"
      ansible_user: cloud-user
      ansible_become: true
      kube_owner: root
      ip: "{{ item.ansible_host }}"
      access_ip: "{{ item.ansible_host }}"
      etcd_member_name: "{{ item.etcd_member_name }}"
      kube_network_plugin: "{{ network_plugin }}"
    loop: "{{ kubespray_nodes }}"

  - name: Show runtime inventory hostvars
    ansible.builtin.debug:
      msg: "{{ item }} => {{ hostvars[item] }}"
    loop: "{{ groups['k8s_cluster'] | default([]) }}"

- name: Validate runtime inventory for Kubespray
  hosts: k8s_cluster
  gather_facts: false
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  tasks:
  - name: Wait for SSH connectivity
    ansible.builtin.wait_for_connection:
      timeout: 300


- name: wait for 120 second to wait for cloud-init to complete on all nodes
  hosts: k8s_cluster
  gather_facts: false
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  tasks:
    - name: Wait for 120 seconds
      ansible.builtin.pause:
        seconds: 120

- name: Install Tailscale on VMs if not already installed
  hosts: k8s_cluster
  gather_facts: false
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  tasks:
    - name: Check if Tailscale is already installed
      become: true
      ansible.builtin.command:
        cmd: tailscale version
      register: tailscale_check
      changed_when: false
      failed_when: false

    - name: Download Tailscale install script
      become: true
      ansible.builtin.get_url:
        url: https://tailscale.com/install.sh
        dest: /tmp/tailscale-install.sh
        mode: "0755"
      when: tailscale_check.rc != 0

    - name: Install Tailscale
      become: true
      ansible.builtin.command:
        cmd: /tmp/tailscale-install.sh
      args:
        creates: /usr/bin/tailscale
      when: tailscale_check.rc != 0

    - name: Check Tailscale status
      become: true
      ansible.builtin.command:
        cmd: tailscale status --json
      register: tailscale_status
      changed_when: false
      failed_when: false
      when: tailscale_check.rc != 0

    - name: Bring Tailscale up
      become: true
      ansible.builtin.command:
        cmd: tailscale up --auth-key={{ tailscale_auth_key }}
      when: tailscale_check.rc != 0
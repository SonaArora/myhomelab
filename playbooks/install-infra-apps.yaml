---
- name: Install infra app using app-of-apps pattern
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/cluster.yaml
  environment:
    KUBECONFIG: "{{ local_kubeconfig }}"
  tasks:

    - name: Wait for ArgoCD server to be ready
      ansible.builtin.command:
        cmd: "kubectl wait --namespace argo-cd --for=condition=ready pod -l app.kubernetes.io/name=argocd-server --timeout=300s"
      changed_when: false

    - name: Apply root application manifest to bootstrap app-of-apps
      ansible.builtin.command:
        cmd: "kubectl apply -f {{ manifest_dir }}/root-app.yml"
      changed_when: true

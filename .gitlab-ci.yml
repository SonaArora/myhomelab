---
# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/user/application_security/sast/#available-cicd-variables
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure/
# Dependency Scanning customization: https://docs.gitlab.com/user/application_security/dependency_scanning/#customizing-analyzer-behavior
# Container Scanning customization: https://docs.gitlab.com/user/application_security/container_scanning/#customizing-analyzer-behavior
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ci/variables/#cicd-variable-precedence
stages:
  - test
  - secret-detection
  - lint
  - k8s-test

sast:
  stage: test

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'

secret_detection:
  stage: secret-detection

# ──────────────────────────────────────────────
# Ansible Lint
# ──────────────────────────────────────────────
ansible-lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --quiet tox
  script:
    - tox -e ansible-lint
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "**/*.yml"
        - "**/*.yaml"
        - roles/**/*
        - playbooks/**/*

# ──────────────────────────────────────────────
# YAML Lint
# ──────────────────────────────────────────────
yaml-lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --quiet tox
  script:
    - tox -e yaml-lint
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "**/*.yml"
        - "**/*.yaml"
# ──────────────────────────────────────────────
# K8s App-of-Apps Test (KIND + Terraform)
# ──────────────────────────────────────────────
k8s-app-of-apps-test:
  stage: k8s-test
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  services:
    - name: docker:27-dind
      alias: docker
      variables:
        DOCKER_TLS_CERTDIR: /certs
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: /certs
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: /certs/client
    CLUSTER_NAME: ci-$CI_PIPELINE_ID
    TF_DIR: $CI_PROJECT_DIR/terraform/kind
  before_script:
    - apk add --no-cache curl bash docker-cli openssl
    - curl -Lo /usr/local/bin/kind
      https://kind.sigs.k8s.io/dl/v0.25.0/kind-linux-amd64
    - chmod +x /usr/local/bin/kind
    - curl -Lo /usr/local/bin/kubectl
      https://dl.k8s.io/release/v1.31.4/bin/linux/amd64/kubectl
    - chmod +x /usr/local/bin/kubectl
    - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  script:
    # --- 1. Create KIND cluster via Terraform ---
    - cd "$TF_DIR"
    - terraform init
    - terraform apply -auto-approve -var="cluster_name=${CLUSTER_NAME}"
    - export KUBECONFIG=$(terraform output -raw kubeconfig_path)
    - sed -i "s/0.0.0.0/docker/g" "$KUBECONFIG"
    - kubectl cluster-info
    # --- 2. Install ArgoCD ---
    - kubectl create namespace argo-cd
    - helm repo add argo-cd https://argoproj.github.io/argo-helm
    - helm repo update
    - >
      helm install argo-cd argo-cd/argo-cd
      --namespace argo-cd
      --wait --timeout 5m
    # --- 3. Apply root app (targetRevision: HEAD = current commit) ---
    - kubectl apply -f "$CI_PROJECT_DIR/k8s-manifests/root-app.yml"
    # --- 4. Wait for root-app to sync (creates child Application objects) ---
    - |
      echo "Waiting for root-app to sync..."
      timeout 120 sh -c '
        until kubectl get application root-app -n argo-cd \
          -o jsonpath="{.status.sync.status}" 2>/dev/null \
          | grep -q "Synced"; do
          echo "  status: $(kubectl get application root-app -n argo-cd \
            -o jsonpath="{.status.sync.status}" 2>/dev/null || echo pending)"
          sleep 5
        done
      '
    # --- 5. Verify all child Application objects were created ---
    - |
      echo "Checking child applications..."
      EXPECTED="argo-cd cert-manager cnpg metric-server monitoring-stack"
      MISSING=0
      for app in $EXPECTED; do
        if kubectl get application "$app" -n argo-cd > /dev/null 2>&1; then
          echo "  OK: $app"
        else
          echo "  MISSING: $app"
          MISSING=$((MISSING + 1))
        fi
      done
      kubectl get applications -n argo-cd
      if [ "$MISSING" -gt 0 ]; then
        echo "FAIL: $MISSING application(s) not created by root-app"
        exit 1
      fi
      echo "All expected applications exist."
  after_script:
    - cd "$CI_PROJECT_DIR/terraform/kind"
    - terraform destroy -auto-approve -var="cluster_name=${CLUSTER_NAME}" || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - k8s-manifests/**/*
